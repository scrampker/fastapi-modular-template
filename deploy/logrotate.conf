# =============================================================================
# logrotate configuration for myapp
# Install: cp logrotate.conf /etc/logrotate.d/myapp
# =============================================================================

/var/log/myapp/*.log {
    # Rotate daily
    daily

    # Keep 30 days of logs
    rotate 30

    # Compress rotated logs with gzip
    compress

    # Delay compression by one rotation cycle (keeps yesterday's log readable)
    delaycompress

    # Do not error if log file is missing
    missingok

    # Do not rotate empty log files
    notifempty

    # Create new log file after rotation with correct ownership
    create 0640 myapp myapp

    # Add date to rotated file names (e.g. app.log-20260408)
    dateext
    dateformat -%Y%m%d

    # Run postrotate script after all logs in this stanza are rotated
    sharedscripts

    postrotate
        # Signal Gunicorn to reopen log files (USR1 triggers graceful log reopen)
        if [ -f /var/run/myapp-web.pid ]; then
            kill -USR1 "$(cat /var/run/myapp-web.pid)" 2>/dev/null || true
        fi

        # Reload Nginx to reopen its log file descriptors
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 "$(cat /var/run/nginx.pid)" 2>/dev/null || true
        fi
    endscript
}

# Nginx access and error logs for this application
/var/log/nginx/myapp_*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    dateext
    dateformat -%Y%m%d
    sharedscripts

    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 "$(cat /var/run/nginx.pid)" 2>/dev/null || true
        fi
    endscript
}
