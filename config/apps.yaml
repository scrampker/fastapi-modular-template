# ScottyCore App Registry
# =======================
# Single source of truth for all apps that consume ScottyCore patterns.
# Used by: sync-watcher.py, pattern_tracker.py, scottycore-validate.py
#
# To register a new app, run:
#   python3 scripts/scottycore-init.py /path/to/app
#
# Or add an entry here manually and run the init script afterward.

# The core template itself. Always present, never a "target" for its own syncs.
scottycore:
  path: /script/scottycore
  stack: FastAPI (shared template)
  branch: master
  is_core: true

# ── Consumer apps ─────────────────────────────────────────────────────────────

scottyscribe:
  path: /script/scottyscribe
  stack: Flask + WhisperX + GPU
  branch: master
  # Flask app — patterns are adapted to Flask idioms (blueprints,
  # before_request hooks) rather than FastAPI services.

scottyscan:
  path: /script/ScottyScan
  stack: PowerShell + webapp
  branch: master
  # The origin app. Most patterns were extracted from here.
  # PowerShell scanner side is domain-specific; webapp side adopts core.

scottomation:
  path: /script/scottomation
  stack: FastAPI + React (Docker / HA add-on)
  branch: main
  # IFTTT-scale automation platform with ScottyScript DSL.
  # Runs as Docker container or Home Assistant add-on.
  # v1 scope: Home Assistant automations via connector architecture.

scottysync:
  path: /script/scottysync
  stack: FastAPI
  branch: master

scottybiz:
  path: /script/scottybiz
  stack: FastAPI
  branch: master
  port: 8100
  fqdn: scottybiz.corpaholics.com

scottystrike:
  path: /script/scottystrike
  stack: FastAPI (CrowdStrike LogScale parser toolkit)
  branch: master
  port: 8101
  fqdn: scottystrike.scotty.consulting
