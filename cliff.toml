# git-cliff configuration for scottycore release notes.
# Sections map to the PRD's changelog shape. Conventional-commits driven.
# Override or augment with hand-authored docs/release-notes/vX.Y.Z.md.

[changelog]
header = ""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | split(pat="\\n") | first | trim }}\
{% if commit.breaking %} — **BREAKING**{% endif %}\
{% endfor %}\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

# Route commits to changelog sections. Order matters (first match wins).
commit_parsers = [
    { message = "^.*!:",                    group = "Breaking Changes" },
    { body    = ".*BREAKING CHANGE",        group = "Breaking Changes" },
    { message = "^feat\\(security\\)",      group = "Security" },
    { message = "^fix\\(security\\)",       group = "Security" },
    { message = "^feat",                    group = "New Features" },
    { message = "^fix",                     group = "Fixes" },
    { message = "^perf",                    group = "Performance" },
    { message = "^refactor",                group = "Internal" },
    { message = "^chore",                   group = "Internal" },
    { message = "^docs",                    group = "Internal" },
    { message = "^test",                    group = "Internal" },
    { message = "^ci",                      group = "Internal" },
    { message = "^style",                   group = "Internal" },
    { message = "^sync",                    skip  = true },
]

filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "newest"
