{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block page_title %}My Profile{% endblock %}

{% block breadcrumb %}
<p class="text-xs text-slate-500 mt-0.5">Account settings</p>
{% endblock %}

{% block content %}
<div x-data="profilePage()" class="max-w-2xl space-y-6">

  <!-- Profile info card -->
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
    <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-5">Account Information</h2>

    <!-- Loading skeleton -->
    <template x-if="loading">
      <div class="space-y-4 animate-pulse">
        <div class="h-4 bg-slate-700 rounded w-48"></div>
        <div class="h-4 bg-slate-700 rounded w-64"></div>
        <div class="h-4 bg-slate-700 rounded w-36"></div>
      </div>
    </template>

    <template x-if="!loading && profile">
      <div class="space-y-5">
        <!-- Avatar + header -->
        <div class="flex items-center gap-4 pb-5 border-b border-slate-700">
          <div class="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center text-xl font-bold text-white flex-shrink-0"
               x-text="initials()"></div>
          <div>
            <p class="text-base font-semibold text-slate-100" x-text="profile.display_name"></p>
            <p class="text-sm text-slate-400" x-text="profile.email"></p>
            <span x-show="profile.is_superadmin"
                  class="inline-block mt-1 px-2 py-0.5 rounded text-xs font-medium bg-purple-900/40 text-purple-300 border border-purple-800">
              Superadmin
            </span>
          </div>
        </div>

        <!-- Account metadata -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <p class="text-xs text-slate-500 mb-0.5">Member since</p>
            <p class="text-sm text-slate-200" x-text="formatDate(profile.created_at)"></p>
          </div>
          <div>
            <p class="text-xs text-slate-500 mb-0.5">Last login</p>
            <p class="text-sm text-slate-200" x-text="profile.last_login ? formatDate(profile.last_login) : 'Never'"></p>
          </div>
          <div>
            <p class="text-xs text-slate-500 mb-0.5">Account status</p>
            <span class="inline-block px-2 py-0.5 rounded text-xs font-medium"
                  :class="profile.is_active ? 'bg-green-900/40 text-green-300 border border-green-800' : 'bg-slate-700 text-slate-500 border border-slate-600'"
                  x-text="profile.is_active ? 'Active' : 'Inactive'">
            </span>
          </div>
        </div>

        <!-- Tenant roles -->
        <div x-show="tenantRoles.length > 0" class="pt-4 border-t border-slate-700">
          <p class="text-xs font-medium text-slate-500 uppercase tracking-wider mb-3">Tenant Access</p>
          <div class="space-y-2">
            <template x-for="tr in tenantRoles" :key="tr.slug">
              <div class="flex items-center justify-between py-2 px-3 rounded-lg bg-slate-900/50 border border-slate-700">
                <span class="text-sm text-slate-200 font-mono" x-text="tr.slug"></span>
                <span class="text-xs px-2 py-0.5 rounded font-medium"
                      :class="{
                        'bg-purple-900/40 text-purple-300 border border-purple-800': tr.role === 'admin',
                        'bg-blue-900/40 text-blue-300 border border-blue-800': tr.role === 'analyst',
                        'bg-slate-700 text-slate-400 border border-slate-600': tr.role === 'viewer',
                      }"
                      x-text="tr.role.charAt(0).toUpperCase() + tr.role.slice(1)">
                </span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Edit display name card -->
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
    <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-5">Edit Profile</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Display Name</label>
        <input type="text" x-model="editName"
               class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-100 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
               placeholder="Your display name"/>
      </div>
      <div x-show="profileMsg" class="px-3 py-2 rounded-lg text-sm"
           :class="profileMsgOk ? 'bg-green-900/40 border border-green-800 text-green-300' : 'bg-red-900/40 border border-red-800 text-red-300'"
           x-text="profileMsg"></div>
      <div class="flex justify-end">
        <button @click="saveProfile()" :disabled="profileSaving"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white transition-colors disabled:opacity-50">
          <span x-show="!profileSaving">Save Changes</span>
          <span x-show="profileSaving" class="animate-pulse">Saving...</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Change password card -->
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
    <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-5">Change Password</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Current Password</label>
        <input type="password" x-model="pw.current"
               class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-100 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">New Password</label>
        <input type="password" x-model="pw.new"
               class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-100 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
               placeholder="Min. 8 characters"/>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Confirm New Password</label>
        <input type="password" x-model="pw.confirm"
               class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-100 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"/>
      </div>
      <div x-show="pwMsg" class="px-3 py-2 rounded-lg text-sm"
           :class="pwMsgOk ? 'bg-green-900/40 border border-green-800 text-green-300' : 'bg-red-900/40 border border-red-800 text-red-300'"
           x-text="pwMsg"></div>
      <div class="flex justify-end">
        <button @click="changePassword()" :disabled="pwSaving"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white transition-colors disabled:opacity-50">
          <span x-show="!pwSaving">Update Password</span>
          <span x-show="pwSaving" class="animate-pulse">Updating...</span>
        </button>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function profilePage() {
  return {
    loading: true,
    profile: null,
    tenantRoles: [],
    editName: '',
    profileMsg: '',
    profileMsgOk: false,
    profileSaving: false,
    pw: { current: '', new: '', confirm: '' },
    pwMsg: '',
    pwMsgOk: false,
    pwSaving: false,

    async init() {
      await this.loadProfile();
    },

    async loadProfile() {
      this.loading = true;
      try {
        const res = await fetch('/api/v1/me', { headers: Auth.getHeaders() });
        if (!res.ok) throw new Error('Failed to load profile');
        this.profile = await res.json();
        this.editName = this.profile.display_name;

        // Load tenants accessible to this user
        const rolesRes = await fetch('/api/v1/tenants?per_page=100', { headers: Auth.getHeaders() });
        if (rolesRes.ok) {
          const data = await rolesRes.json();
          this.tenantRoles = (data.items || []).map(t => ({
            slug: t.slug,
            role: (this.profile.tenant_roles || {})[t.slug] || 'viewer',
          }));
        }
      } catch (e) {
        showToast('Failed to load profile', 'error');
      } finally {
        this.loading = false;
      }
    },

    initials() {
      if (!this.profile) return '?';
      const parts = (this.profile.display_name || this.profile.email).split(' ');
      return parts.slice(0, 2).map(p => p[0]).join('').toUpperCase();
    },

    async saveProfile() {
      this.profileMsg = '';
      if (!this.editName.trim()) {
        this.profileMsg = 'Display name cannot be empty.';
        this.profileMsgOk = false;
        return;
      }
      this.profileSaving = true;
      try {
        const res = await fetch('/api/v1/me', {
          method: 'PATCH',
          headers: { ...Auth.getHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ display_name: this.editName.trim() }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          this.profileMsg = err.detail || 'Failed to update profile.';
          this.profileMsgOk = false;
          return;
        }
        const updated = await res.json();
        this.profile = updated;
        this.editName = updated.display_name;
        this.profileMsg = 'Profile updated successfully.';
        this.profileMsgOk = true;
      } catch (e) {
        this.profileMsg = 'An unexpected error occurred.';
        this.profileMsgOk = false;
      } finally {
        this.profileSaving = false;
      }
    },

    async changePassword() {
      this.pwMsg = '';
      if (!this.pw.current || !this.pw.new || !this.pw.confirm) {
        this.pwMsg = 'All password fields are required.';
        this.pwMsgOk = false;
        return;
      }
      if (this.pw.new.length < 8) {
        this.pwMsg = 'New password must be at least 8 characters.';
        this.pwMsgOk = false;
        return;
      }
      if (this.pw.new !== this.pw.confirm) {
        this.pwMsg = 'New passwords do not match.';
        this.pwMsgOk = false;
        return;
      }
      this.pwSaving = true;
      try {
        const res = await fetch('/api/v1/me/password', {
          method: 'POST',
          headers: { ...Auth.getHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: this.pw.current, new_password: this.pw.new }),
        });
        if (res.status === 401) {
          this.pwMsg = 'Current password is incorrect.';
          this.pwMsgOk = false;
          return;
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          this.pwMsg = err.detail || 'Failed to change password.';
          this.pwMsgOk = false;
          return;
        }
        this.pw = { current: '', new: '', confirm: '' };
        this.pwMsg = 'Password changed successfully.';
        this.pwMsgOk = true;
      } catch (e) {
        this.pwMsg = 'An unexpected error occurred.';
        this.pwMsgOk = false;
      } finally {
        this.pwSaving = false;
      }
    },

    formatDate(dt) {
      if (!dt) return '—';
      return new Date(dt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    },
  }
}
</script>
{% endblock %}
