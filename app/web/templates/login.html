<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In &mdash; {{ app_name }}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body class="h-full bg-slate-900 text-slate-100 font-sans antialiased flex items-center justify-center">

<div class="w-full max-w-sm px-4" x-data="loginForm()">

  <!-- Logo / brand -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600 mb-3">
      <span class="text-white font-bold text-xl">{{ app_name[0] | upper if app_name else 'A' }}</span>
    </div>
    <h1 class="text-2xl font-bold text-slate-100">{{ app_name }}</h1>
    <p class="text-sm text-slate-400 mt-1"
       x-text="step === 'totp' ? 'Two-Factor Authentication' : 'Sign in to your account'"></p>
  </div>

  <!-- SSO option (conditional) -->
  {% if sso_enabled %}
  <div class="mb-6" x-show="step === 'credentials'">
    <a href="/auth/sso"
       class="flex items-center justify-center gap-2 w-full py-2 px-4 rounded-md border border-slate-600
              bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-medium transition-colors">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      Continue with SSO
    </a>
    <div class="relative my-5">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-700"></div>
      </div>
      <div class="relative flex justify-center text-xs">
        <span class="px-2 bg-slate-900 text-slate-500">or sign in with password</span>
      </div>
    </div>
  </div>
  {% endif %}

  <!-- Login card -->
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-xl">

    <!-- Error banner -->
    <div x-show="error" x-cloak
         class="mb-4 px-3 py-2 rounded-md bg-red-900/50 border border-red-700 text-sm text-red-300"
         x-text="error">
    </div>

    <!-- ── Step 1: Email + Password ─────────────────────────────── -->
    <form x-show="step === 'credentials'" @submit.prevent="submitCredentials" novalidate>

      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email address</label>
        <input id="email"
               type="email"
               x-model="email"
               autocomplete="email"
               required
               placeholder="you@example.com"
               class="w-full px-3 py-2 rounded-md bg-slate-900 border border-slate-600 text-slate-100
                      placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                      focus:border-transparent transition-colors" />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
        <div class="relative">
          <input id="password"
                 :type="showPassword ? 'text' : 'password'"
                 x-model="password"
                 autocomplete="current-password"
                 required
                 placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
                 class="w-full px-3 py-2 pr-16 rounded-md bg-slate-900 border border-slate-600 text-slate-100
                        placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500
                        focus:border-transparent transition-colors" />
          <button type="button"
                  @click="showPassword = !showPassword"
                  class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-slate-400
                         hover:text-slate-200 px-1.5 py-0.5 rounded transition-colors"
                  x-text="showPassword ? 'Hide' : 'Show'">
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit"
              :disabled="loading"
              class="w-full py-2 px-4 rounded-md bg-blue-600 hover:bg-blue-500 disabled:opacity-50
                     disabled:cursor-not-allowed text-white text-sm font-semibold transition-colors
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
                     focus:ring-offset-slate-800">
        <span x-show="!loading">Sign in</span>
        <span x-show="loading" x-cloak class="flex items-center justify-center gap-2">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Signing in...
        </span>
      </button>

    </form>

    <!-- ── Step 2: TOTP Verification ────────────────────────────── -->
    <form x-show="step === 'totp'" x-cloak @submit.prevent="submitTotp" novalidate>

      <!-- Info banner -->
      <div class="mb-4 px-3 py-2 rounded-md bg-blue-900/30 border border-blue-700/50 text-sm text-blue-300 leading-relaxed">
        Enter the 6-digit code from your <strong class="text-blue-200">authenticator app</strong>,
        or use one of your backup codes.
      </div>

      <!-- TOTP code input -->
      <div class="mb-6">
        <label for="totp-code" class="block text-sm font-medium text-slate-300 mb-1.5">
          Verification Code
        </label>
        <input id="totp-code"
               type="text"
               x-model="totpCode"
               x-ref="totpInput"
               autocomplete="one-time-code"
               inputmode="numeric"
               maxlength="8"
               required
               placeholder="000000"
               class="w-full px-3 py-3 rounded-md bg-slate-900 border border-slate-600 text-slate-100
                      text-center text-2xl tracking-[0.5em] font-mono
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      transition-colors" />
      </div>

      <!-- Verify button -->
      <button type="submit"
              :disabled="loading"
              class="w-full py-2 px-4 rounded-md bg-blue-600 hover:bg-blue-500 disabled:opacity-50
                     disabled:cursor-not-allowed text-white text-sm font-semibold transition-colors
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
                     focus:ring-offset-slate-800">
        <span x-show="!loading">Verify</span>
        <span x-show="loading" x-cloak class="flex items-center justify-center gap-2">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Verifying...
        </span>
      </button>

      <!-- Back link -->
      <button type="button"
              @click="step = 'credentials'; error = null; totpCode = '';"
              class="mt-3 w-full text-center text-xs text-slate-500 hover:text-slate-300 transition-colors
                     bg-transparent border-0 cursor-pointer">
        &larr; Back to sign in
      </button>

    </form>

  </div>

  <!-- Footer note -->
  <p class="mt-6 text-center text-xs text-slate-600">
    {{ app_name }} &mdash; access is restricted to authorized users
  </p>
</div>

<script>
function loginForm() {
  return {
    step: 'credentials',   // 'credentials' | 'totp'
    email: '',
    password: '',
    showPassword: false,
    totpCode: '',
    partialToken: null,
    loading: false,
    error: '',

    async submitCredentials() {
      this.loading = true;
      this.error = '';

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: this.email, password: this.password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          this.error = data.detail || 'Invalid email or password.';
          return;
        }

        if (data.requires_totp) {
          this.partialToken = data.partial_token;
          this.step = 'totp';
          this.$nextTick(() => {
            if (this.$refs.totpInput) this.$refs.totpInput.focus();
          });
          return;
        }

        // Full token received — store and redirect
        if (data.access_token) {
          localStorage.setItem('app_token', data.access_token);
          localStorage.setItem('app_token_type', data.token_type || 'bearer');
        }

        const next = new URLSearchParams(window.location.search).get('next');
        window.location.href = next || '/c/default/dashboard';
      } catch (_err) {
        this.error = 'Network error. Please try again.';
      } finally {
        this.loading = false;
      }
    },

    async submitTotp() {
      this.loading = true;
      this.error = '';

      try {
        const res = await fetch('/api/v1/auth/totp/verify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${this.partialToken}`,
          },
          body: JSON.stringify({ code: this.totpCode }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          this.error = data.detail || 'Invalid verification code.';
          this.totpCode = '';
          return;
        }

        // Store full access token and redirect
        if (data.access_token) {
          localStorage.setItem('app_token', data.access_token);
          localStorage.setItem('app_token_type', data.token_type || 'bearer');
        }

        const next = new URLSearchParams(window.location.search).get('next');
        window.location.href = next || '/c/default/dashboard';
      } catch (_err) {
        this.error = 'Network error. Please try again.';
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>

</body>
</html>
