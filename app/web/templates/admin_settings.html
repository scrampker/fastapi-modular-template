{% extends "base.html" %}

{% block title %}Platform Settings{% endblock %}
{% block page_title %}Platform Settings{% endblock %}

{% block breadcrumb %}
<p class="text-xs text-slate-500 mt-0.5">Global configuration</p>
{% endblock %}

{% block content %}
<div x-data="adminSettings()" class="flex gap-6">

  <!-- Left-rail nav -->
  <aside class="w-44 flex-shrink-0">
    <nav class="space-y-0.5">
      <template x-for="section in sections" :key="section.id">
        <button @click="activeSection = section.id"
                :class="activeSection === section.id
                  ? 'bg-slate-700 text-white'
                  : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'"
                class="w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-sm
                       font-medium transition-colors">
          <span x-text="section.label"></span>
        </button>
      </template>
    </nav>

    <!-- Search -->
    <div class="mt-4">
      <input type="search"
             x-model.debounce.300ms="searchQuery"
             @input="filterSettings()"
             placeholder="Search…"
             class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-700
                    text-slate-200 placeholder-slate-500 text-sm focus:outline-none
                    focus:ring-2 focus:ring-blue-500" />
    </div>
  </aside>

  <!-- Settings panel -->
  <div class="flex-1 min-w-0 max-w-2xl space-y-6">

    <!-- Global settings tab (superadmin only) -->
    <div x-show="activeSection === 'global'" id="settings-global-container">
      <!-- Populated by renderSettingsWidgets() in x-init -->
      <div class="text-slate-500 text-sm animate-pulse">Loading…</div>
    </div>

    <!-- User preferences tab -->
    <div x-show="activeSection === 'user'" id="settings-user-container">
      <div class="text-slate-500 text-sm animate-pulse">Loading…</div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/settings_schema.js"></script>
<script>
function adminSettings() {
  return {
    activeSection: 'global',
    searchQuery: '',
    sections: [
      { id: 'global', label: 'Platform' },
      { id: 'user',   label: 'My Preferences' },
    ],

    // Track pending SMTP test state
    _smtpTesting: false,

    async init() {
      await Promise.all([
        this._loadTab('global'),
        this._loadTab('user'),
      ]);
      this._bindActionButtons();
    },

    async _loadTab(tab) {
      const currentValues = await fetchSettings(tab);
      const isSuperadmin = true;   // page is superadmin-gated by the server route
      renderSettingsWidgets(
        `settings-${tab}-container`,
        tab,
        isSuperadmin,
        currentValues,
        async (_tab, values) => patchSettings(_tab, values)
      );
    },

    /** Wire up action buttons (SMTP test, etc.) after render. */
    _bindActionButtons() {
      document.querySelectorAll('.action-btn[data-action]').forEach(btn => {
        const action = btn.dataset.action;
        btn.addEventListener('click', () => this._runAction(action, btn));
      });
    },

    async _runAction(action, btn) {
      if (action === 'smtpTest') {
        if (this._smtpTesting) return;
        this._smtpTesting = true;
        const orig = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Sending…';
        try {
          const res = await fetch('/api/v1/settings/smtp/test', {
            method: 'POST',
            headers: Auth.getHeaders(),
          });
          showToast(res.ok ? 'Test email sent.' : 'SMTP test failed.', res.ok ? 'success' : 'error');
        } catch (_) {
          showToast('Network error.', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = orig;
          this._smtpTesting = false;
        }
      }
    },

    filterSettings() {
      const activeContainer = `settings-${this.activeSection}-container`;
      filterSettingsWidgets(activeContainer, this.searchQuery);
    },

    /** Re-apply filter when the tab changes. */
    switchTab(id) {
      this.activeSection = id;
      this.$nextTick(() => this.filterSettings());
    },
  };
}
</script>
{% endblock %}
